<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="main">
        <div class="container">
            <div class="monitor">
                <input id="showResult" type="text">
            </div>
            <div class="buttons">
                <div class="btnsNumber">
                    <input type="button" value="1" id="num1" class="val">
                    <input type="button" value="2" id="num2" class="val">
                    <input type="button" value="3" id="num3" class="val">
                    <input type="button" value="4" id="num4" class="val">
                    <input type="button" value="5" id="num5" class="val">
                    <input type="button" value="6" id="num6" class="val">
                    <input type="button" value="7" id="num7" class="val">
                    <input type="button" value="8" id="num8" class="val">
                    <input type="button" value="9" id="num9" class="val">
                    <input type="button" value="." id="dot"  class="val">
                    <input type="button" value="0" id="num0" class="val">
                    <input type="button" value="del" id="del">
                </div>
                <div class="btnsOperator">
                    <input type="button" value="*" id="multiplication" class="val">
                    <input type="button" value="/" id="division" class="val">
                    <input type="button" value="+" id="plural" class="val">
                    <input type="button" value="-" id="subtraction" class="val">
                    <input type="button" value="%" id="percentage" class="val">
                    <input type="button" value="^" id="power" class="val">
                    <input type="button" value="=" id="Calculate" class="Calculate">
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
